        // Fetch New Releases
        async function fetchNewReleases() {
            try {
                const res = await fetch("/api/newReleases");
                if (!res.ok) throw new Error('API error');
                const data = await res.json();
                renderNewReleases(data);
            } catch (err) {
                console.error('Error fetching new releases:', err);
                const container = document.getElementById('new-releases');
                if (container) container.innerHTML = '<div class="loading">Unable to load</div>';
            }
        }

        function renderNewReleases(data) {
            const container = document.getElementById('new-releases');
            if (!data?.data) {
                container.innerHTML = '<div class="loading">No new releases</div>';
                return;
            }

            container.innerHTML = data.data.map(item => {
                // Handle different image formats - could be string or array
                let imageUrl = '';
                if (typeof item.image === 'string') {
                    imageUrl = item.image.replace('150x150', '500x500');
                } else if (Array.isArray(item.image)) {
                    imageUrl = item.image[2]?.url || item.image[0]?.url || '';
                    imageUrl = imageUrl.replace('150x150', '500x500');
                } else if (item.image?.url) {
                    imageUrl = item.image.url.replace('150x150', '500x500');
                }

                if (item.type === 'song') {
                    const artists = item.more_info?.artistMap?.primary_artists?.map(a => a.name).join(', ') || item.subtitle || '';
                    return `
                        <div class="result-card" onclick="playSong('${item.id}')">
                            <img src="${imageUrl}" alt="${item.title}">
                            <h3>${item.title}</h3>
                            <p>${artists}</p>
                        </div>
                    `;
                } else {
                    return `
                        <div class="result-card" onclick="openAlbum('${item.id}')">
                            <img src="${imageUrl}" alt="${item.title}">
                            <h3>${item.title}</h3>
                            <p>Album</p>
                        </div>
                    `;
                }
            }).join('');
        }

        function renderTopSearches(items) {
            const container = document.getElementById('top-searches');
            if (!items || !items.length) {
                container.innerHTML = '<div class="loading">No trending content</div>';
                return;
            }

            // Handle both array of strings and array of objects
            container.innerHTML = items.map(item => {
                if (typeof item === 'string') {
                    // Simple string array - search for it
                    return `
                        <div class="result-card" onclick="search('${item.replace(/'/g, "\\'")}')">
                            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 300'%3E%3Crect fill='%23282828' width='300' height='300'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23666' font-size='24'%3E🔍%3C/text%3E%3C/svg%3E" alt="${item}">
                            <h3>${item}</h3>
                            <p>Search</p>
                        </div>
                    `;
                }
                // Object format (if API changes)
                const isSong = item.type === 'song';
                const url = isSong ? `onclick="playSong('${item.id}')"` : `onclick="openAlbum('${item.id}')"`;
                const image = item.image?.replace('150x150', '500x500') || item.image || '';
                return `

<script>
(function() {
    function updateSearchBar(view) {
        const isMobile = window.matchMedia('(max-width: 768px)').matches;
        const sc = document.querySelector('.header-center');
        if (!sc) return;
        if (isMobile) {
            sc.style.display = (view === 'search') ? 'flex' : 'none';
        } else {
            sc.style.display = 'flex';
        }
    }

    window.navigateBottomNav = function(view) {
        document.querySelectorAll('.bottom-nav-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.querySelector('.bottom-nav-btn[data-view="' + view + '"]');
        if (activeBtn) activeBtn.classList.add('active');

        if (view === 'home') {
            if (typeof goHome === 'function') goHome();
            if (typeof closeMobileMenu === 'function') closeMobileMenu();
        } else if (view === 'search') {
            if (typeof homeView !== 'undefined') homeView.classList.add('hidden');
            if (typeof searchView !== 'undefined') searchView.classList.remove('hidden');
            if (typeof libraryView !== 'undefined') libraryView.classList.add('hidden');
            if (typeof searchInput !== 'undefined') searchInput.focus();
            if (typeof history !== 'undefined') history.pushState({ view: 'search' }, '', '#search');
            if (typeof closeMobileMenu === 'function') closeMobileMenu();
        } else if (view === 'library') {
            if (typeof toggleMobileMenu === 'function') toggleMobileMenu();
            if (typeof closeRightSidebar === 'function') closeRightSidebar();
        } else if (view === 'create') {
            if (typeof createPlaylist === 'function') createPlaylist();
            if (typeof closeMobileMenu === 'function') closeMobileMenu();
        }
        updateSearchBar(view);
    };

    window.syncBottomNavFromHash = function() {
        const hash = window.location.hash || '#home';
        let view = 'home';
        if (hash.startsWith('#search')) view = 'search';
        else if (hash === '#library') view = 'library';

        document.querySelectorAll('.bottom-nav-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.querySelector('.bottom-nav-btn[data-view="' + view + '"]');
        if (activeBtn) activeBtn.classList.add('active');
        updateSearchBar(view);
    };

    const _origGoHome = window.goHome;
    window.goHome = function() {
        if (_origGoHome) {
            _origGoHome();
        } else {
            if (typeof homeView !== 'undefined') homeView.classList.remove('hidden');
            if (typeof searchView !== 'undefined') searchView.classList.add('hidden');
            if (typeof libraryView !== 'undefined') libraryView.classList.add('hidden');
            if (typeof renderRecentSection === 'function') renderRecentSection();
            if (typeof history !== 'undefined') history.pushState({ view: 'home' }, '', '#home');
        }
        syncBottomNavFromHash();
    };

    window.addEventListener('load', syncBottomNavFromHash);
})();
</script>
